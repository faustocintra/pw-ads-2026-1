<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício de Fixação 1 - React</title>
  <style>
    .cor-nome {
      color: darkblue;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }
    .cor-data {
      color: darkgreen;
      font-family: 'Courier New', Courier, monospace;
    }
    .box-idade {
      border: 1px solid #333;
      background-color: #f0f0f0;
      padding: 5px;
      margin-top: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

  <div id="root"></div>

  <script type="text/babel">

    /* EXERCÍCIO DE FIXAÇÃO nº 1

      2) Declare uma função de componente que receba as seguintes
         props personalizadas: nome, sobrenome, dia, mes e ano.
    */
    function Pessoa({ nome, sobrenome, dia, mes, ano }) {

      /* 6) No componente, crie, ainda, uma div. Dentro dela, deve ser exibida
            a idade que a pessoa terá ao final do ano, calculada por meio de
            um cálculo simples (2026 menos o ano de nascimento informado). */
      const idadeFinalAno = 2026 - ano

      return (
        /* 3) Na função de componente, coloque um fragment (<> ou <React.Fragment>) */
        <>
          {/* 3) no primeiro parágrafo, deve ser aplicada a classe que deixa a cor do texto em uma cor.
              4) No primeiro parágrafo, deve ser exibido o nome completo (nome e sobrenome). */}
          <p className="cor-nome">
            {nome} {sobrenome}
          </p>

          {/* 3) no outro, a classe que deixa a cor na outra cor.
              5) No segundo parágrafo, deve ser exibida a data de nascimento separada por /. */}
          <p className="cor-data">
            {dia}/{mes}/{ano}
          </p>

          {/* 6) Continuação: exibição da div com o cálculo da idade */}
          <div className="box-idade">
            Idade ao final de 2026: {idadeFinalAno} anos
          </div>
        </>
      )
    }

    /* Criando o container com a chamada do componente e as props informadas */
    const container = (
      <Pessoa 
        nome="Maria" 
        sobrenome="Silva" 
        dia={10} 
        mes={5} 
        ano={2000} 
      />
    )

    // ESSENCIAL: Criar a raiz e renderizar o container na div #root
    const root = ReactDOM.createRoot(document.getElementById('root'))
    root.render(container)

  </script>

</body>
</html>
