<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Introdução a React</title>
  <style>
    div.caixa-estilo {
      font-family: 'Courier New', monospace;
      color: darkblue;
      background: aliceblue;
      text-align: center;
      margin-bottom: 15px;
      border: 2px solid darkblue;
      border-radius: 8px;
      padding: 10px
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

  <div id="root"></div>

  <script>
    // Criando elemento com React.createElement
    const container1 = React.createElement(
      'div',
      {
        id: 'elemento1',
        className: 'caixa-estilo'
      },
      'Elemento criado com React puro'
    )

    // Props do botão
    const propsBtn = {
      id: 'botao-principal',
      style: {
        color: 'white',
        background: 'darkblue',
        padding: '12px'
      },
      children: 'Clique em mim!',
      onClick: () => alert('Olá!')
    }

    const botao = React.createElement('button', propsBtn)

    // Parágrafo simples
    const paragrafo = React.createElement('p', { children: 'Parágrafo de teste' })

    // Container principal
    const app = React.createElement(
      'div',
      {
        id: 'app',
        children: [container1, botao, paragrafo],
        style: {
          border: '1px dotted darkred',
          padding: '20px'
        }
      }
    )

    // Renderizar
    const root = ReactDOM.createRoot(document.getElementById('root'))
    root.render(app)
  </script>
</body>
</html>
