<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .sauda {
        background: indigo;
        border-radius: 8px;
        color: white;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.25);
        padding: 12px;
        text-align: center ;
        font-family: Cambria, serif;
        margin-top: 20px;
    }
</style>
<body>
    <!-- Scripts para carregar remotamente o React e o Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>


  <div id="root"></div>

        <script type="text/babel">

    /*
    Em React, os elemetos contruiudos dinamicamente são chamados
    Componentes e podem ser produzidos por meio de funções.
    
    Um função de componente no React possui três caracteristicas:
    1ª ~> seu nome começa com LetraMaiuscula (convenção PascalCase)
    2° ~> Podem receber props com parametro entre {}
    3° ~> retornam um unico elemento, o qual pode ser um container
    para outros elementos 
    */

    // Exemplo de função de componente em React
    function Saudacao({nome,msg}) {
        return <div className="sauda"> {msg}, {nome}!</div>
    }

    // Criando um componente a partir de uma chamada explicita à função
    const saudacao1 = Saudacao({msg : 'Bom dia', nome : 'Dona Clementina'})

    // Criando um componentem a partir da funcao usando sintaxe jsx
    const saudacao2 = <Saudacao nome="Seu Bita" msg="O sol já nasceu lá na fazendinha" />

    /*
     Container em JSX
     <> </> é um pseudoelemento do React chamado FRAGMENT. Ele permite agrupar
     vários elementos sem gerar um elemento HTML adcional (como uma div,por exemplo)
     no resultado renderizado. O Fragment é útil para organizar o código e evitar a criação de elementos desnecessários na estrutura do DOM.
    */
    const container = 
    <>
        {saudacao1}
        {saudacao2}
    </>

    const root = ReactDOM.createRoot(document.getElementById('root'))
    root.render(container)
   </script>  
</body>
</html>
