<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tipos de Props</title>
  <style>
    .notificacao {
      border-radius: 4px;
      border: 2px solid red;
      background-color: khaki;
      padding: 10px;
      font-family: Calibri, sans;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

  <div id="root"></div>

  <script type="text/babel">
    /*
      Props podem ser GENÉRICAS (passadas via spread)
      ou PERSONALIZADAS (nomeadas explicitamente)
    */

    // Props genéricas - todas as props são processadas
    const Notificacao = props => <div className="notificacao" {...props} />

    // Props personalizadas - apenas id e children
    const Alerta = ({id, children}) =>
      <div className="notificacao" id={id}>{children}</div>

    const propsNotif = {
      id: 'notif1',
      title: 'Notificação 1',
      children: 'CUIDADO: área molhada!',
      extra: 'ignorado'
    }

    const app =
      <>
        <Notificacao {...propsNotif} />

        <Notificacao
          id="notif2"
          title="Notificação 2"
          teste="ignorado"
        >
          Favor, desligue as luzes!
        </Notificacao>

        <Alerta id="alerta1" title="Alerta 1" teste="ignorado">
          Use a escada com cuidado.
        </Alerta>
      </>

    const root = ReactDOM.createRoot(document.getElementById('root'))
    root.render(app)
  </script>
</body>
</html>
