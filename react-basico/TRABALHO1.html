<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de área de formas geométricas planas</title>
  <style>
    * { font-family: Candara, Arial, sans-serif; }
    body {
      background: linear-gradient(
        0deg,
        rgba(77, 57, 224, 0.75) 0%,
        rgb(71, 111, 7) 35%,
        rgb(210, 44, 196) 100%
      );
      height: 100vh;
    }
    main {
      margin: 40px auto;
      width: 512px;
      max-width: 80%;
      padding: 20px;
      background-color: white;
      border-radius: 16px;
      text-align: center;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
    }
    label { display: block; margin-bottom: 16px; }
    label span { display: block; }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Carrega React, ReactDOM e Babel para JSX no navegador -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">

    /*
     * CalculadoraArea - Componente de CLASSE
     * -------------------------------------------------------
     * Replica as funcionalidades do componente funcional
     * "FormSoma", porém utilizando a API de classes do React.
     *
     * Funcionalidades replicadas:
     *   1. Três campos controlados: base, altura e tipo de forma.
     *   2. Cálculo de área para Retângulo, Triângulo e Elipse.
     *   3. Persistência dos valores no localStorage, de modo que
     *      os dados sobrevivam ao fechamento do navegador.
     *   4. Leitura do localStorage na inicialização.
     */
    class CalculadoraArea extends React.Component {

      // ── constructor ──────────────────────────────────────
      // Equivalente ao React.useState com valor inicial.
      // Lê os valores salvos no localStorage; se não existirem,
      // usa strings vazias para base/altura e 'R' para o tipo.
      constructor(props) {
        super(props);
        this.state = {
          base:   window.localStorage.getItem('__base')   || '',
          altura: window.localStorage.getItem('__altura') || '',
          tipo:   window.localStorage.getItem('__tipo')   || 'R',
        };
      }

      // ── componentDidUpdate ───────────────────────────────
      // Equivalente ao React.useEffect(() => { ... }, [base, altura, tipo]).
      // É chamado automaticamente após cada atualização de estado.
      // Persiste os três valores no localStorage para que permaneçam
      // disponíveis mesmo após o navegador ser fechado e reaberto.
      componentDidUpdate() {
        window.localStorage.setItem('__base',   this.state.base);
        window.localStorage.setItem('__altura', this.state.altura);
        window.localStorage.setItem('__tipo',   this.state.tipo);
      }

      // ── calcularArea ─────────────────────────────────────
      // Lógica de cálculo idêntica à função calcularArea()
      // do componente funcional original.
      calcularArea() {
        const { base, altura, tipo } = this.state;
        let resultado;

        switch (tipo) {
          case 'R':   // Retângulo: base × altura
            resultado = Number(base) * Number(altura);
            break;
          case 'T':   // Triângulo: (base × altura) / 2
            resultado = Number(base) * Number(altura) / 2;
            break;
          default:    // Elipse/círculo: π × (base/2) × (altura/2)
            resultado = (Number(base) / 2) * (Number(altura) / 2) * Math.PI;
        }

        // Se o resultado não for um número válido, retorna vazio;
        // caso contrário, formata no padrão pt-BR (vírgula decimal).
        if (isNaN(resultado)) return '';
        return resultado.toLocaleString('pt-BR');
      }

      // ^^^^^^^^^^^^^ render ───────────────────────────────────────────
      // Equivalente ao return do componente funcional.
      // Desestrutura o estado para uso direto no JSX.
      render() {
        const { base, altura, tipo } = this.state;
        const area = this.calcularArea();

        return (
          <main>
            <h1>Calculadora de área de formas geométricas planas</h1>
            <form>

              {/* Campo: Medida da base */}
              <label>
                <span>Medida da base</span>
                <input
                  type="number"
                  value={base}
                  onChange={e => this.setState({ base: e.target.value })}
                />
              </label>

              {/* Campo: Medida da altura */}
              <label>
                <span>Medida da altura</span>
                <input
                  type="number"
                  value={altura}
                  onChange={e => this.setState({ altura: e.target.value })}
                />
              </label>

              {/* Seletor: Tipo de forma geométrica */}
              <label>
                <span>Tipo de forma</span>
                <select
                  value={tipo}
                  onChange={e => this.setState({ tipo: e.target.value })}
                >
                  <option value="R">Retângulo</option>
                  <option value="T">Triângulo</option>
                  <option value="E">Elipse/círculo</option>
                </select>
              </label>

              {/* Exibição do resultado calculado */}
              <label>
                <span>Área calculada</span>
                <div><strong>{area}</strong></div>
              </label>

            </form>
          </main>
        );
      }
    }

    // Monta o componente de classe no elemento raiz do DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CalculadoraArea />);

  </script>

</body>
</html>
