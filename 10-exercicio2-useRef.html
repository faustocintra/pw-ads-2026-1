<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cálculo da área de uma elipse — useRef</title>
</head>
<body>
 
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
 
  <div id="root"></div>
 
  <script type="text/babel">
    function Elipse() {
      /*
        Criando referências para os elementos usando React.useRef().
        As referências serão usadas no lugar do atributo id.
      */
      const raioMaiorRef = React.useRef()
      const raioMenorRef = React.useRef()
      const resultadoRef = React.useRef()
 
      function handleChange() {
        /*
          Observe: <ref>.current equivale a
                   document.getElementById('id')
        */
        const raioMaior = Number(raioMaiorRef.current.value)
        const raioMenor = Number(raioMenorRef.current.value)
 
        // Só calcula e exibe quando os dois campos estiverem preenchidos
        if (raioMaiorRef.current.value === '' || raioMenorRef.current.value === '') {
          resultadoRef.current.textContent = ''
          return
        }
 
        const area = raioMaior * raioMenor * Math.PI
 
        resultadoRef.current.textContent =
          'Área: ' + area.toLocaleString('pt-br', {
            minimumFractionDigits: 4,
            maximumFractionDigits: 4
          })
      }
 
      return <>
        <h1>Cálculo da área de uma elipse — useRef</h1>
        <form>
          <div>
            <label>
              <span>Medida do raio maior:</span><br />
              {/*
                Observe:
                * ref está sendo usado em vez de id
                * onChange em React equivale ao oninput do JS puro
                * Não é necessário passar o parâmetro event para os
                  manipuladores de eventos
              */}
              <input ref={raioMaiorRef} type="number" onChange={handleChange} />
            </label>
          </div>
          <div>
            <label>
              <span>Medida do raio menor:</span><br />
              <input ref={raioMenorRef} type="number" onChange={handleChange} />
            </label>
          </div>
          <div ref={resultadoRef}></div>
        </form>
      </>
    }
 
    const root = ReactDOM.createRoot(document.getElementById('root'))
    root.render(<Elipse />)
  </script>
 
</body>
</html>
