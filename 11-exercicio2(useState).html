<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cálculo da área de uma elipse (React useState)</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function CalculadoraElipse() {
      const [raioMaior, setRaioMaior] = useState('');
      const [raioMenor, setRaioMenor] = useState('');

      const calcularArea = () => {
        const area = Number(raioMaior) * Number(raioMenor) * Math.PI;
        return area.toLocaleString('pt-br', { 
          minimumFractionDigits: 4, 
          maximumFractionDigits: 4 
        });
      };

      return (
        <div>
          <h1>Cálculo da área de uma elipse</h1>
          <form>
            <div>
              <label>
                <span>Medida do raio maior:</span><br />
                <input 
                  type="number" 
                  value={raioMaior}
                  onChange={(e) => setRaioMaior(e.target.value)} 
                />
              </label>
            </div>
            <div>
              <label>
                <span>Medida do raio menor:</span><br />
                <input 
                  type="number" 
                  value={raioMenor}
                  onChange={(e) => setRaioMenor(e.target.value)} 
                />
              </label>
            </div>
            <div style={{ marginTop: '10px' }}>
              {raioMaior && raioMenor ? `Área: ${calcularArea()}` : ''}
            </div>
          </form>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CalculadoraElipse />);
  </script>
</body>
</html>
